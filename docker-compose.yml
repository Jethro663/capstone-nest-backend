services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: capstone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "200411"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed for optional debugging; remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capstone"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lms-network

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - lms-network

  # ── Ollama (AI Service) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
          ollama serve &
          SERVE_PID=$$!

          echo '==> Waiting for Ollama server to start...'
          i=0
          while [ $$i -lt 30 ]; do
            if curl -sf http://localhost:11434/ > /dev/null 2>&1; then
              break
            fi
            sleep 2
            i=$$((i+1))
          done

          echo "==> Pulling text model: $$OLLAMA_TEXT_MODEL"
          ollama pull "$$OLLAMA_TEXT_MODEL"

          echo "==> Pulling vision model: $$OLLAMA_VISION_MODEL"
          ollama pull "$$OLLAMA_VISION_MODEL"

          echo "==> Pulling embedding model: $$OLLAMA_EMBED_MODEL"
          ollama pull "$$OLLAMA_EMBED_MODEL"

          echo "==> All models are ready. Ollama is serving."

          wait "$$SERVE_PID"
    environment:
      - OLLAMA_TEXT_MODEL=${OLLAMA_TEXT_MODEL:-qwen2.5:3b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-gemma3:4b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q . || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s
    networks:
      - lms-network

  # ── NestJS Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "3000:3000"
    environment:
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/ready > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - lms-network

  # ── Python AI Service ──────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./ai-service/.env.docker
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ready > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - lms-network

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./next-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lms-network

volumes:
  postgres_data:
  ollama_data:
  backend_uploads:

networks:
  lms-network:
    driver: bridge
