services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: capstone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "200411"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Exposed for optional debugging; remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capstone"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lms-network

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - lms-network

  # ── Ollama (AI Service) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
          ollama serve &
          SERVE_PID=$$!

          echo '==> Waiting for Ollama server to start...'
          i=0
          while [ $$i -lt 30 ]; do
            if curl -sf http://localhost:11434/ > /dev/null 2>&1; then
              break
            fi
            sleep 2
            i=$$((i+1))
          done

          echo "==> Pulling model: $$OLLAMA_MODEL"
          ollama pull "$$OLLAMA_MODEL"
          echo "==> Pull finished. Ollama is serving."

          wait "$$SERVE_PID"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q . || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s
    networks:
      - lms-network

  # ── NestJS Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - lms-network

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./next-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_started
    networks:
      - lms-network

volumes:
  postgres_data:
  ollama_data:
  backend_uploads:

networks:
  lms-network:
    driver: bridge
